  <!-- CSS Files -->

  <script src="https://unpkg.com/htmx-ext-response-targets@2.0.0/response-targets.js"></script>

  <style>
    input, button {
      margin-bottom: 2vh;
    }
    #progress {
      width: 45vw
    }
    input[type=file]::file-selector-button {
      border: 0;
      cursor: pointer;
      color: #ffffff;
      box-shadow: 0 3px 3px 0 rgba(76, 175, 80, 0.15), 0 3px 1px -2px rgba(76, 175, 80, 0.2), 0 1px 5px 0 rgba(76, 175, 80, 0.15);
      margin-bottom: 1rem;
      letter-spacing: 0;
      text-transform: uppercase;
      background-size: 150%;
      background-position-x: 25%;
      position: relative;
      overflow: hidden;
      -webkit-appearance: none;
      --bs-btn-padding-x: 1.5rem;
      --bs-btn-padding-y: 0.625rem;
      --bs-btn-font-family: ;
      --bs-btn-font-size: 0.75rem;
      --bs-btn-font-weight: 700;
      --bs-btn-line-height: 1.667;
      --bs-btn-border-width: 1px;
      --bs-btn-border-radius: 0.5rem;
      --bs-btn-box-shadow: 0 4px 7px -1px rgba(0, 0, 0, 0.11), 0 2px 4px -1px rgba(0, 0, 0, 0.07);
      --bs-btn-disabled-opacity: 0.65;
      --bs-btn-focus-box-shadow: 0 0 0 0.2rem rgba(var(--bs-btn-focus-shadow-rgb), .5);
      display: inline-block;
      padding: var(--bs-btn-padding-y) var(--bs-btn-padding-x);
      font-size: var(--bs-btn-font-size);
      font-weight: var(--bs-btn-font-weight);
      line-height: var(--bs-btn-line-height);
      text-align: center;
      vertical-align: middle;
      user-select: none;
      border-radius: var(--bs-btn-border-radius);
      background-color: var(--bs-btn-bg);
      transition: all 0.15s ease-in;
      --bs-btn-color: #000;
      --bs-btn-bg: #4CAF50;
      --bs-btn-border-color: #4CAF50;
      --bs-btn-hover-color: #000;
      --bs-btn-hover-bg: #67bb6a;
      --bs-btn-hover-border-color: #5eb762;
      --bs-btn-focus-shadow-rgb: 65, 149, 68;
      --bs-btn-active-color: #000;
      --bs-btn-active-bg: #70bf73;
      --bs-btn-active-border-color: #5eb762;
      --bs-btn-active-shadow: none;
      --bs-btn-disabled-color: #000;
      --bs-btn-disabled-bg: #4CAF50;
      --bs-btn-disabled-border-color: #4CAF50;
    }

    input[type=file]::file-selector-button:hover {
      background-color: #4CAF50;
      border-color: #4CAF50;
      box-shadow: 0 14px 26px -12px rgba(76, 175, 80, 0.4), 0 4px 23px 0 rgba(76, 175, 80, 0.15), 0 8px 10px -5px rgba(76, 175, 80, 0.2);
    }
  </style>

</head>

  </nav>

  <!-- End Navbar -->
  <div class="container-fluid py-4">

    <div hx-ext="response-targets">
      <input form='form' id='file' type='file' name='file'><br>
      <form id='form'
            hx-encoding='multipart/form-data'
            hx-post='/upload'
            hx-target="#response"
            hx-target-error="#error"
      >
        <button class="btn btn-success">Upload</button>
        <div>
          <progress id='progress' value='0' max='100'></progress>
        </div>
        <div id="response"></div>
        <div id="error"></div>
        <div id="error2"></div>

      </form>
    </div>

    <footer class="footer py-4  ">

                   target="_blank"></a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

  </div>


</main>

<script>
  htmx.on('#form', 'htmx:xhr:progress', function(evt) {
    htmx.find('#progress').setAttribute('value', evt.detail.loaded/evt.detail.total * 100)
  });

  document.getElementById('form').addEventListener('htmx:responseError', function(evt) {
    document.getElementById('error2').innerHTML = evt.detail.error
  });

  const resetForm = () => {
    document.getElementById('response').innerHTML = '';
    document.getElementById('progress').value = 0;
    document.getElementById('file').value = '';
  }
</script>
